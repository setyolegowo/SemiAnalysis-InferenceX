name: Template - Multi-Node Benchmark

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      image:
        required: true
        type: string
      model:
        required: true
        type: string
      model-prefix:
        required: true
        type: string
      framework:
        required: true
        type: string
      precision:
        required: true
        type: string
      exp-name:
        required: true
        type: string
      isl:
        required: true
        type: string
      osl:
        required: true
        type: string
      conc-list:
        required: true
        type: string
      spec-decoding:
        required: true
        type: string
      disagg:
        required: true
        type: string

      max-model-len:
        required: true
        type: string

      prefill-num-worker:
        required: true
        type: string
      prefill-tp:
        required: true
        type: string
      prefill-ep:
        required: true
        type: string
      prefill-dp-attn:
        required: true
        type: string
      prefill-additional-settings:
        required: false
        type: string
        default: "[]"

      decode-num-worker:
        required: true
        type: string
      decode-tp:
        required: true
        type: string
      decode-ep:
        required: true
        type: string
      decode-dp-attn:
        required: true
        type: string
      decode-additional-settings:
        required: false
        type: string
        default: "[]"
      run-eval:
        type: boolean
        required: false
        default: false
      eval-only:
        description: "Run only evals (skip throughput benchmark)"
        type: boolean
        required: false
        default: false
      eval-conc:
        description: "Concurrency to use for eval requests (overrides default max-of-conc-list)"
        type: string
        required: false
        default: ""
      ref:
        description: "Git ref (branch/sha) to checkout"
        required: false
        type: string

env:
  RANDOM_RANGE_RATIO: 0.8
  EXP_NAME: ${{ inputs.exp-name }}
  IMAGE: ${{ inputs.image }}
  MODEL_PREFIX: ${{ inputs.model-prefix }}
  MODEL: ${{ inputs.model }}
  FRAMEWORK: ${{ inputs.framework }}
  PRECISION: ${{ inputs.precision }}
  ISL: ${{ inputs.isl }}
  OSL: ${{ inputs.osl }}
  MAX_MODEL_LEN: ${{ inputs.max-model-len }}
  CONC_LIST: ${{ join(fromJson(inputs.conc-list), ' ') }}
  SPEC_DECODING: ${{ inputs.spec-decoding }}
  DISAGG: ${{ inputs.disagg }}
  RUN_EVAL: ${{ inputs.run-eval }}
  EVAL_ONLY: ${{ inputs.eval-only }}
  EVAL_CONC: ${{ inputs.eval-conc }}
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONPYCACHEPREFIX: /tmp/inferencex-pycache

  PREFILL_NUM_WORKERS: ${{ inputs.prefill-num-worker }}
  PREFILL_TP: ${{ inputs.prefill-tp }}
  PREFILL_EP: ${{ inputs.prefill-ep }}
  PREFILL_DP_ATTN: ${{ inputs.prefill-dp-attn }}

  DECODE_NUM_WORKERS: ${{ inputs.decode-num-worker }}
  DECODE_TP: ${{ inputs.decode-tp }}
  DECODE_EP: ${{ inputs.decode-ep }}
  DECODE_DP_ATTN: ${{ inputs.decode-dp-attn }}

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 480
    name: "${{ inputs.exp-name }} ${{ inputs.precision }} ${{ inputs.runner }} ${{ inputs.framework }} | P(tp${{ inputs.prefill-tp }}/ep${{ inputs.prefill-ep }}/dp${{ inputs.prefill-dp-attn }}/nw${{ inputs.prefill-num-worker }}) D(tp${{ inputs.decode-tp }}/ep${{ inputs.decode-ep }}/dp${{ inputs.decode-dp-attn }}/nw${{ inputs.decode-num-worker }}) | disagg-${{ inputs.disagg }} spec-${{ inputs.spec-decoding }} conc-${{ join(fromJson(inputs.conc-list), 'x') }}${{ inputs.eval-only && ' | eval-only' || (inputs.run-eval && ' | eval' || '') }}"

    steps:
      - name: Slurm cleanup (pre-run)
        run: &slurm-cleanup |
          if command -v squeue >/dev/null 2>&1; then
            echo "[Slurm] Cleaning up jobs with name: ${{ runner.name }} ..."
            scancel --name="${{ runner.name }}" || true
            while [ -n "$(squeue --name='${{ runner.name }}' --noheader --format='%i')" ]; do
              squeue --name="${{ runner.name }}"
              sleep 5
            done
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}
          clean: false

      - name: Cleanup stale eval outputs (pre-run)
        if: ${{ inputs.run-eval || inputs.eval-only }}
        run: |
          rm -f meta_env.json || true
          rm -f results*.json || true
          rm -f sample*.jsonl || true

      - name: Launch multi-node job script
        env:
          RUNNER_NAME: ${{ runner.name }}
          RUNNER_TYPE: ${{ inputs.runner }}
          # Hash uniquely on {EXP_NAME}_{PRECISION}_{FRAMEWORK}_prefill-tp{}-ep{}-dp{}-nw{}_decode-tp{}-ep{}-dp{}-nw{}_disagg-{}_spec-{}_conc{}_{runner}
          RESULT_FILENAME: ${{ env.EXP_NAME }}_${{ env.PRECISION }}_${{ env.FRAMEWORK }}_prefill-tp${{ env.PREFILL_TP }}-ep${{ env.PREFILL_EP }}-dp${{ env.PREFILL_DP_ATTN }}-nw${{ env.PREFILL_NUM_WORKERS }}_decode-tp${{ env.DECODE_TP }}-ep${{ env.DECODE_EP }}-dp${{ env.DECODE_DP_ATTN }}-nw${{ env.DECODE_NUM_WORKERS }}_disagg-${{ env.DISAGG }}_spec-${{ env.SPEC_DECODING }}_conc${{ join(fromJson(inputs.conc-list), 'x') }}_${{ runner.name }}
        run: |
          set -x
          # Export RESULT_FILENAME early so it's available for artifact uploads even if cancelled
          echo "RESULT_FILENAME=${RESULT_FILENAME}" >> $GITHUB_ENV

          export ${{ join(fromJson(inputs.prefill-additional-settings), ' ') }} ${{ join(fromJson(inputs.decode-additional-settings), ' ') }}
          export IS_MULTINODE=true
          bash ./runners/launch_${RUNNER_NAME%%_*}.sh
          if [ "${{ inputs.eval-only }}" = "true" ]; then
            echo "Eval-only mode: skipping benchmark result file check"
            # Verify eval produced results
            if ! ls results*.json 1>/dev/null 2>&1; then
              echo "Eval-only run failed: no results*.json files found." >&2
              exit 1
            fi
          else
            # Check if at least one result file was created
            if ls ${RESULT_FILENAME}_*.json 1> /dev/null 2>&1; then
              echo "RESULT_FILENAME=${RESULT_FILENAME}" >> $GITHUB_ENV
              echo "Found result files: $(ls ${RESULT_FILENAME}_*.json)"
            else
              echo "Run failed: No benchmark result files found for ${RESULT_FILENAME}_*.json" >&2
              exit 1
            fi
          fi

      - name: Process result
        if: ${{ !inputs.eval-only }}
        env:
          RUNNER_TYPE: ${{ inputs.runner }}
        run: |
          # Process each result file
          for result_file in ${RESULT_FILENAME}_*.json; do
            if [ -f "$result_file" ]; then
              echo "Processing $result_file"
              # Extract GPU count, prefill_gpus and decode_gpus from filename for tp_size calculation
              gpus=$(echo "$result_file" | sed -n "s/.*_gpus_\([0-9]*\).*\.json/\1/p")
              prefill_gpus=$(echo "$result_file" | sed -n "s/.*_ctx_\([0-9]*\).*\.json/\1/p")
              decode_gpus=$(echo "$result_file" | sed -n "s/.*_gen_\([0-9]*\).*\.json/\1/p")
              
              if [ -n "$gpus" ]; then
                echo "Extracted: gpus=$gpus, prefill_gpus=$prefill_gpus, decode_gpus=$decode_gpus"
                RESULT_FILENAME=${result_file%.json} IS_MULTINODE=true PREFILL_GPUS="$prefill_gpus" DECODE_GPUS="$decode_gpus" python3 utils/process_result.py
              fi
            fi
          done

      # - name: Upload result
      #   if: ${{ !inputs.eval-only }}
      #   uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      #   with:
      #     name: bmk_${{ env.RESULT_FILENAME }}
      #     path: agg_${{ env.RESULT_FILENAME }}_*.json

      # - name: Upload server logs
      #   if: always()
      #   uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      #   with:
      #     name: multinode_server_logs_${{ env.RESULT_FILENAME }}
      #     path: multinode_server_logs.tar.gz
      #     if-no-files-found: ignore

      # - name: Upload eval results (if any)
      #   if: ${{ always() && (env.RUN_EVAL == 'true' || inputs.eval-only) }}
      #   uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      #   with:
      #     name: eval_${{ env.EXP_NAME }}_${{ env.RESULT_FILENAME }}
      #     path: |
      #       meta_env.json
      #       results*.json
      #       sample*.jsonl
      #     if-no-files-found: ${{ inputs.eval-only && 'error' || 'ignore' }}

      # - name: Verify eval scores
      #   if: ${{ (success() || failure()) && inputs.eval-only }}
      #   run: python3 utils/evals/validate_scores.py

      - name: Cleanup eval outputs (post-upload)
        if: ${{ always() && (inputs.run-eval || inputs.eval-only) }}
        run: |
          rm -f meta_env.json || true
          rm -f results*.json || true
          rm -f sample*.jsonl || true

      - name: Slurm cleanup (post-run)
        if: always()
        run: *slurm-cleanup
